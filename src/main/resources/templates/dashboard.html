<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <!-- Professional Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <title>FinTrack Dashboard</title>
    <style>
        body {
            background-color: #f0f2f5;
            font-family: 'Inter', sans-serif;
            padding-top: 40px;
            color: #1a1a1a;
        }
        .main-card {
            border: none;
            border-radius: 20px;
            overflow: hidden;
        }
        .header-section {
            background-color: #212529;
            color: #ffffff;
            padding: 30px;
            text-align: center;
        }
        .header-section h1 {
            font-weight: 800;
            letter-spacing: -1px;
            margin: 0;
            font-size: 2.5rem;
        }
        .stat-card {
            border: 1px solid #dee2e6;
            border-left: 6px solid #0d6efd;
            border-radius: 12px;
            padding: 20px;
            background: #fff;
        }
        .stat-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #6c757d;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stat-value {
            font-size: 2.2rem; /* Larger, readable numbers */
            font-weight: 800;
            color: #0d6efd;
            margin: 0;
        }
        .form-control {
            border-radius: 8px;
            padding: 12px 15px;
            border: 1px solid #ced4da;
            font-size: 1rem;
        }
        .btn-add {
            background-color: #212529;
            color: white;
            font-weight: 600;
            padding: 12px 30px;
            border-radius: 8px;
            transition: 0.3s;
        }
        .btn-add:hover {
            background-color: #343a40;
            color: #fff;
        }
        .table {
            margin-top: 10px;
        }
        .table thead th {
            background-color: #fff;
            color: #212529;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 1.1rem;
            border-top: none;
            padding: 15px;
        }
        .table tbody td {
            padding: 18px 15px;
            font-size: 1rem;
            vertical-align: middle;
        }
        .amount-cell {
            font-weight: 700;
            font-size: 1.1rem;
            color: #212529;
        }
        .badge-category {
            background-color: #e9ecef;
            color: #495057;
            font-weight: 600;
            padding: 8px 14px;
            border-radius: 6px;
        }
    </style>
</head>
<body>

<div class="container mb-5">
    <div class="card main-card shadow-lg">
        <!-- Professional Header -->
        <div class="header-section">
            <h1>FINTRACK DASHBOARD</h1>
        </div>
        
        <div class="card-body p-4 p-lg-5">
            <div class="row g-4 align-items-center">
                <!-- Highlighted Total Spent -->
                <div class="col-lg-4">
                    <div class="stat-card shadow-sm">
                        <p class="stat-label mb-1">Total Spent</p>
                        <h2 class="stat-value" th:text="'$' + ${#numbers.formatDecimal(totalSpent, 1, 2)}">$0.00</h2>
                    </div>
                </div>

                <!-- Input Form with better spacing -->
                <div class="col-lg-8">
                    <form th:action="@{/add}" method="post" class="row g-3">
                        <div class="col-md-5">
                            <input type="text" name="description" placeholder="What did you buy?" class="form-control" required>
                        </div>
                        <div class="col-md-4">
                            <input type="text" name="category" placeholder="Category (e.g. Food)" class="form-control" required>
                        </div>
                        <div class="col-md-3">
                            <input type="number" step="0.01" name="amount" placeholder="Amount" class="form-control" required>
                        </div>
                        <div class="col-12 text-end">
                            <button type="submit" class="btn btn-add shadow-sm w-100 w-md-auto">Add Transaction</button>
                        </div>
                    </form>
                </div>

                <!-- Clean Table Section -->
                <div class="col-12 mt-5">
                    <h4 class="fw-bold mb-4">Recent Transactions</h4>
                    <div class="table-responsive">
                        <table class="table border-top">
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Description</th>
                                    <th>Category</th>
                                    <th class="text-end">Amount</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="exp : ${expenses}">
                                    <td class="text-muted" th:text="${exp.dateAdded}"></td>
                                    <td class="fw-bold" th:text="${exp.description}"></td>
                                    <td>
                                        <span class="badge-category" th:text="${exp.category}">Category</span>
                                    </td>
                                    <td class="text-end amount-cell" th:text="'$' + ${#numbers.formatDecimal(exp.amount, 1, 2)}"></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div> <!-- End Row -->
        </div> <!-- End Card Body -->
    </div> <!-- End Main Card -->
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
